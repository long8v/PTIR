name: Fetch Zotero Library

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Zotero library
        run: python scripts/fetch_zotero.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/data/zotero.json
          git diff --staged --quiet || git commit -m "data: update Zotero library"
          git push

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build
        working-directory: blog
        run: hugo --minify --baseURL "https://long8v.github.io/PTIR/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
