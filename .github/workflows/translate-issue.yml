name: Translate Issue to Blog Post

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  translate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Translate issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          python scripts/translate_issue.py --issue-number ${{ github.event.issue.number }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/content/posts/
          git diff --staged --quiet || git commit -m "post: translate issue #${{ github.event.issue.number }}"
          git push

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build
        working-directory: blog
        run: hugo --minify --baseURL "https://long8v.github.io/PTIR/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
